services:
  agentfield:
    image: agentfield/control-plane:latest
    pull_policy: always
    ports:
      - "8080:8080"
    environment:
      - AF_MODE=dev
      - AGENTFIELD_HTTP_ADDR=0.0.0.0:8080
      - AGENTFIELD_STORAGE_MODE=local
    volumes:
      - agentfield-data:/data
    restart: unless-stopped

  pr-af:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      - AGENTFIELD_SERVER=http://agentfield:8080
      - AGENTFIELD_API_KEY=${AGENTFIELD_API_KEY:-}
      - AGENT_CALLBACK_URL=http://pr-af:8004
      - PR_AF_PROVIDER=${PR_AF_PROVIDER:-opencode}
      - PR_AF_MODEL=${PR_AF_MODEL:-openrouter/moonshotai/kimi-k2.5}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GH_TOKEN=${GH_TOKEN:-}
      - XDG_DATA_HOME=/home/praf/.local/share
      - PR_AF_WORKDIR=/workspaces
    volumes:
      - pr-af-workspaces:/workspaces
      - opencode-data:/home/praf/.local/share
    depends_on:
      agentfield:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  agentfield-data:
  pr-af-workspaces:
  opencode-data:
